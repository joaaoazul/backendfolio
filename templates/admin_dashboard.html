<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Admin — Mensagens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { techgreen: '#2563eb' } } } }</script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen font-sans p-8">

<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black tracking-tighter">
            Mensagens <span class="text-techgreen">({{ contactos|length }})</span>
        </h1>
        <a href="/admin/logout"
           class="text-sm text-zinc-500 hover:text-white transition-colors">
            Sair →
        </a>
    </div>

    {% if not contactos %}
    <p class="text-zinc-600 text-center py-20">Nenhuma mensagem ainda.</p>
    {% endif %}

    <div class="space-y-4">
        {% for c in contactos %}
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6
                    {% if not c.lido %}border-techgreen/40{% endif %}">
            <div class="flex justify-between items-start gap-4">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-3 mb-1">
                        <p class="font-black text-white">{{ c.name }}</p>
                        {% if not c.lido %}
                        <span class="text-[10px] font-bold uppercase tracking-widest
                                     text-techgreen bg-techgreen/10 px-2 py-0.5 rounded-full">
                            Novo
                        </span>
                        {% endif %}
                    </div>
                    <a href="mailto:{{ c.email }}"
                       class="text-sm text-techgreen hover:underline">{{ c.email }}</a>
                    <p class="text-xs text-zinc-600 mt-1">
                        {{ c.created_at.strftime('%d/%m/%Y às %H:%M') }} UTC
                    </p>
                </div>

                <form method="POST" action="/admin/delete/{{ c.id }}"
                      onsubmit="return confirm('Apagar esta mensagem?')">
                    <button type="submit"
                            class="text-zinc-600 hover:text-red-400 transition-colors text-xl
                                   leading-none cursor-pointer">
                        ×
                    </button>
                </form>
            </div>

            <p class="mt-4 text-zinc-300 text-sm leading-relaxed whitespace-pre-wrap
                       border-t border-zinc-800 pt-4">{{ c.message }}</p>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
