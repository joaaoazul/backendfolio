<section id="contact-section" class="py-24 border-t border-zinc-900 flex flex-col items-center text-center">
    <h2 class="text-4xl md:text-6xl font-black tracking-tighter mb-8">
        Vamos construir algo juntos?
    </h2>

    <div id="flash-messages" class="w-full max-w-md mb-6">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="p-4 mb-4 text-sm text-techgreen rounded-lg bg-zinc-900 border border-techgreen font-bold shadow-lg">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <form method="POST" hx-post="/contact" hx-target="#contact-section" hx-swap="outerHTML" class="w-full max-w-md space-y-6">

        {{ form.hidden_tag() }}

        <div class="flex flex-col">
            <label class="text-left font-semibold mb-2 text-zinc-300">Nome</label>
            <input type="text" name="name" class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-700 rounded-lg focus:border-techgreen focus:outline-none transition-all placeholder:text-zinc-500" placeholder="João Azul" required>
        </div>

        <div class="flex flex-col">
            <label class="text-left font-semibold mb-2 text-zinc-300">Email</label>
            <input type="email" name="email" class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-700 rounded-lg focus:border-techgreen focus:outline-none transition-all placeholder:text-zinc-500" placeholder="cybersec.joao@proton.me" required>
        </div>

        <div class="flex flex-col">
            <label class="text-left font-semibold mb-2 text-zinc-300">Mensagem</label>
            <textarea name="message" class="w-full px-4 py-6 bg-zinc-900/50 border border-zinc-700 rounded-lg focus:border-techgreen focus:outline-none transition-all resize-vertical placeholder:text-zinc-500 min-h-[120px]" placeholder="Conta-me o teu projeto..." required></textarea>
        </div>

        <button type="submit" class="flex items-center justify-center gap-4 w-full text-white transition-all duration-300 group border border-zinc-800 rounded-full py-5 text-xl bg-zinc-900/50 hover:bg-techgreen hover:border-techgreen shadow-2xl hover:scale-105 active:scale-95 font-bold">
            Enviar Mensagem
        </button>
    </form>
</section>
