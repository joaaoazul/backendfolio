<section id="contact-section" class="py-24 border-t border-zinc-900 flex flex-col items-center text-center transition-all duration-500">
    <h2 class="text-4xl md:text-6xl font-black tracking-tighter mb-8">
        {{ t.construir | safe }}
    </h2>

    {% if success %}
        <div class="mt-12 w-full max-w-md p-8 bg-zinc-900/40 border border-techgreen/50 rounded-[2rem] shadow-[0_0_30px_rgba(37,99,235,0.15)] flex flex-col items-center justify-center animate-[pulse_0.5s_ease-out]">

            <div class="w-20 h-20 bg-techgreen/20 rounded-full flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>

            <h3 class="text-2xl font-black text-white mb-3">Sucesso!</h3>
            <p class="text-zinc-400 font-medium text-lg leading-relaxed">
                {{ msg }}
            </p>

            <button hx-get="/contact-content" hx-target="#contact-section" hx-swap="outerHTML" class="mt-8 text-sm font-bold uppercase tracking-widest text-techgreen hover:text-white transition-colors cursor-pointer outline-none">
                Enviar nova mensagem
            </button>
        </div>

    {% else %}
        <div id="flash-messages" class="w-full max-w-md mb-6">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="p-4 mb-4 text-sm text-red-400 rounded-lg bg-red-900/20 border border-red-500/50 font-bold shadow-lg animate-[pulse_0.5s_ease-out]">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form method="POST" hx-post="/contact" hx-target="#contact-section" hx-swap="outerHTML" class="w-full max-w-md space-y-6">
            {{ form.hidden_tag() }}

            <div class="flex flex-col group">
                <label class="text-left font-semibold mb-2 text-zinc-400 group-focus-within:text-techgreen transition-colors">Nome</label>
                <input type="text" name="name" class="w-full px-4 py-4 bg-zinc-900/50 border border-zinc-800 rounded-xl focus:border-techgreen focus:ring-1 focus:ring-techgreen focus:outline-none transition-all placeholder:text-zinc-600" placeholder="O teu nome" required>
            </div>

            <div class="flex flex-col group">
                <label class="text-left font-semibold mb-2 text-zinc-400 group-focus-within:text-techgreen transition-colors">Email</label>
                <input type="email" name="email" class="w-full px-4 py-4 bg-zinc-900/50 border border-zinc-800 rounded-xl focus:border-techgreen focus:ring-1 focus:ring-techgreen focus:outline-none transition-all placeholder:text-zinc-600" placeholder="exemplo@email.com" required>
            </div>

            <div class="flex flex-col group">
                <label class="text-left font-semibold mb-2 text-zinc-400 group-focus-within:text-techgreen transition-colors">Mensagem</label>
                <textarea name="message" class="w-full px-4 py-4 bg-zinc-900/50 border border-zinc-800 rounded-xl focus:border-techgreen focus:ring-1 focus:ring-techgreen focus:outline-none transition-all resize-vertical placeholder:text-zinc-600 min-h-[140px]" placeholder="Como posso ajudar?" required></textarea>
            </div>

            <button type="submit" class="flex items-center justify-center gap-4 w-full text-white transition-all duration-300 border border-zinc-700 rounded-xl py-5 text-xl bg-zinc-800 hover:bg-techgreen hover:border-techgreen shadow-lg hover:-translate-y-1 active:scale-95 font-bold cursor-pointer">
                {{ t.submit_label }}
            </button>
        </form>
    {% endif %}
</section>
