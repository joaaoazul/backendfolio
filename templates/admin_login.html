<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Admin — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { techgreen: '#2563eb' } } } }</script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center font-sans">
<div class="w-full max-w-sm p-8 bg-zinc-900 border border-zinc-800 rounded-2xl">
    <h1 class="text-2xl font-black mb-6 tracking-tighter">
        Admin <span class="text-techgreen">.</span>
    </h1>

    {% if error %}
    <p class="mb-4 text-sm text-red-400 bg-red-900/20 border border-red-500/30 rounded-lg p-3">
        {{ error }}
    </p>
    {% endif %}

    <form method="POST" class="space-y-4">
        <input type="password" name="password" placeholder="Password"
               autofocus required
               class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl
                          focus:border-techgreen focus:outline-none transition-colors">
        <button type="submit"
                class="w-full py-3 bg-techgreen text-white font-bold rounded-xl
                           hover:bg-blue-700 transition-colors">
            Entrar
        </button>
    </form>
</div>
</body>
</html>
