<section class="grid grid-cols-1 md:grid-cols-12 gap-8 md:gap-12 items-center min-h-[80vh] py-12">

    <div class="md:col-span-5 relative max-w-[320px] md:max-w-none mx-auto w-full">
        <div class="relative rounded-[2rem] overflow-hidden aspect-[4/5]">
            <img src="{{ url_for('static', filename='assets/joaolanding.png') }}" alt="Foto do João Azul"
                 class="hero-img w-full h-full">
        </div>
    </div>

    <div class="md:col-span-7 flex flex-col text-center md:text-left items-center md:items-start">
        <h1 class="text-4xl sm:text-6xl md:text-7xl lg:text-8xl font-black tracking-tighter leading-none mb-4">
            João Azul<span class="text-techgreen group-hover:animate-pulse">.</span>
        </h1>

        <h2 class="text-2xl sm:text-4xl md:text-5xl lg:text-6xl font-black tracking-tighter leading-[0.95] mb-6 md:mb-10 text-white/90">
            {{ t.estudante }}<br>
            {{ t.futuro }}
            <span class="relative inline-block px-1">
                <span class="relative z-10 text-white text-stroke">{{ t.engenheiro }}</span>
                <div class="absolute -bottom-1 left-0 w-full h-2 md:h-4 bg-techgreen/40 rounded-full -rotate-1 blur-[1px]"></div>
                <div class="absolute -bottom-1 left-0 w-full h-1 md:h-2 bg-techgreen rounded-full -rotate-1"></div>
            </span>
            {{ t.de_software|safe }}
        </h2>

        <p class="text-base md:text-xl text-zinc-500 max-w-xl leading-relaxed mb-8 md:mb-12 px-4 md:px-0">
            {{ t.desc }}
        </p>

        <div class="flex flex-col sm:flex-row gap-8 items-center mt-4 w-full sm:w-auto">

            <a href="#projetos" hx-get="/projects-content" hx-target="#main-content" hx-push-url="true" class="group relative px-8 py-4 border-2 border-white text-white font-bold rounded-full overflow-hidden transition-all duration-300 hover:text-black hover:bg-white active:scale-95 w-full sm:w-auto text-center cursor-pointer">
                 <span class="relative z-10 flex items-center justify-center gap-2">
                     {{ t.btn_projetos }}
                     <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="transition-transform duration-300 group-hover:translate-x-1">
                        <path d="M5 12h14m-7-7 7 7-7 7"/>
                     </svg>
                 </span>
                <span class="absolute bottom-0 left-0 w-0 h-0.5 transition-all duration-300 group-hover:w-full"></span>
            </a>

            <div class="flex items-center gap-4 border-t sm:border-t-0 sm:border-l border-zinc-800 pt-6 sm:pt-0 sm:pl-6">

                <a href="https://github.com/joaaoazul" target="_blank" rel="noopener noreferrer" class="transition-transform duration-300 hover:scale-110 hover:-translate-y-1">
                    <img src="https://skillicons.dev/icons?i=github&theme=dark" alt="GitHub" class="w-12 h-12 md:w-14 md:h-14 drop-shadow-lg">
                </a>

                <a href="https://linkedin.com/in/joao-azul" target="_blank" rel="noopener noreferrer" class="transition-transform duration-300 hover:scale-110 hover:-translate-y-1">
                    <img src="https://skillicons.dev/icons?i=linkedin&theme=dark" alt="LinkedIn" class="w-12 h-12 md:w-14 md:h-14 drop-shadow-lg">
                </a>

                <a href="mailto:cybersec.joao@proton.me" class="transition-transform duration-300 hover:scale-110 hover:-translate-y-1">
                    <img src="https://skillicons.dev/icons?i=gmail&theme=dark" alt="Email" class="w-12 h-12 md:w-14 md:h-14 drop-shadow-lg">
                </a>

            </div>

        </div>
    </div>
</section>

<div class="pb-32">
    {% include 'tech_fragment.html' %}
</div>

<div class="pb-24">
    {% include 'contacts_fragment.html' %}
</div>
